<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloom Valley Nursery – Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page">

    <!-- Header -->
    <header>
      <div class="logo">
        <img src="logo.png" alt="Bloom Valley Nursery Logo">
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="community.html">Community</a></li>
        </ul>
      </nav>
    </header>

    <!-- Gallery Heading -->
    <h2>Gallery</h2>
    <button class="filter-btn">Filter List</button>

    <!-- Gallery Grid -->
    <section class="gallery-grid">
      <div class="gallery-item">
        <div class="image-placeholder">Image 1</div>
        <h3>Project Title</h3>
        <p>Short Description</p>
        <button class="details-btn">See Details</button>
      </div>

      <div class="gallery-item">
        <div class="image-placeholder">Image 2</div>
        <h3>Project Title</h3>
        <p>Short Description</p>
        <button class="details-btn">See Details</button>
      </div>

      <div class="gallery-item">
        <div class="image-placeholder">Image 3</div>
        <h3>Project Title</h3>
        <p>Short Description</p>
        <button class="details-btn">See Details</button>
      </div>
    </section>

    <!-- Pagination -->
    <div class="pagination">
      <span>Page 1 of 10</span>
      <div style="display:flex; gap:6px;">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-search">
        <input type="text" placeholder="Search Bloom Valley...">
        <button>Go</button>
      </div>

      <div class="footer-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="community.html">Community</a></li>
        </ul>
      </div>
    </footer>

  </div>
</body>
</html>
